<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<title>{{ doc_title }}</title>
<script src="/static/js/paged.polyfill.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Налаштування сторінки для Paged.js ── */
@page {
    size: {{ tpl.page_size or 'A4' }} {{ tpl.page_orientation or 'portrait' }};
    margin: {{ tpl.margin_top or 20 }}mm
            {{ tpl.margin_right or 10 }}mm
            {{ tpl.margin_bottom or 20 }}mm
            {{ tpl.margin_left or 30 }}mm;
}

body {
    font-family: '{{ tpl.font_family or 'Times New Roman' }}', serif;
    font-size: {{ tpl.base_font_size or 12 }}pt;
    line-height: 1.5;
}

/* ── Для екрану (Paged.js додає .pagedjs_page) ── */
.pagedjs_pages {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #e8e8e8;
    padding: 20px;
    min-height: 100vh;
}

.pagedjs_page {
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
    margin-bottom: 20px;
}

/* ── Fallback для друку без Paged.js ── */
@media print {
    body { background: white; }
    .no-print { display: none !important; }
}

/* ── Зміст документа ── */
table { border-collapse: collapse; }
table td, table th { padding: 3px 6px; }

h1 { font-size: 1.4em; margin: .4em 0 .3em; }
h2 { font-size: 1.2em; margin: .3em 0 .2em; }
h3 { font-size: 1.05em; margin: .3em 0 .2em; }
p { margin: 0 0 .3em; }

/* Шорткоди не мають бути видимі в друці */
.sc-token { display: none; }
</style>
</head>
<body>

<div class="no-print" style="position:fixed;top:0;left:0;right:0;z-index:9999;text-align:center;padding:8px 10px;background:#fff3cd;border-bottom:2px solid #ffc107;font-size:14px">
    <strong>{{ doc_title }}</strong>
    <button onclick="window.print()" style="padding:4px 16px;cursor:pointer;margin-left:12px;background:#0d6efd;color:white;border:none;border-radius:4px">
        🖨 Друк / PDF
    </button>
    <button onclick="window.close()" style="padding:4px 12px;cursor:pointer;margin-left:4px;background:#6c757d;color:white;border:none;border-radius:4px">
        ✕ Закрити
    </button>
    {% if tpl.id %}
    <span style="color:#888;font-size:.8rem;margin-left:16px">
        Шаблон: {{ tpl.name }}
        (<a href="/doc-templates/{{ tpl.id }}/edit" target="_blank">редагувати</a>)
    </span>
    {% endif %}
    <span id="pagedStatus" style="color:#888;font-size:.75rem;margin-left:12px"></span>
</div>

<div style="margin-top:50px">
    {{ rendered_body | safe }}
</div>

<script>
// Показати статус Paged.js
if (window.PagedPolyfill) {
    document.getElementById('pagedStatus').textContent = 'Paged.js: завантажено ✓';
}
</script>
</body>
</html>
