{% extends "base.html" %}
{% block title %}404 — Сторінку не знайдено{% endblock %}

{% block content %}
<div class="container-fluid py-5 text-center">
    <div class="mb-4" style="font-size:5rem;color:#dee2e6">
        <i class="bi bi-file-earmark-x"></i>
    </div>
    <h1 class="display-4 fw-bold text-secondary">404</h1>
    <p class="fs-5 text-muted mb-4">Сторінку не знайдено</p>

    {% if auto_fid %}
    <div class="alert alert-warning d-inline-flex align-items-center gap-2 mb-4 text-start" style="max-width:520px">
        <i class="bi bi-bug-fill fs-5"></i>
        <span>Помилку <strong>автоматично додано</strong> в багтрекер
            (<a href="{{ url_for('feedback.index') }}#fid-{{ auto_fid }}">#{{ auto_fid }}</a>).
        </span>
    </div>
    {% endif %}

    <div class="d-flex gap-2 justify-content-center">
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
            <i class="bi bi-house"></i> На головну
        </a>
        {% if auto_fid %}
        <a href="{{ url_for('feedback.index') }}" class="btn btn-outline-secondary">
            <i class="bi bi-bug me-1"></i>Відкрити багтрекер
        </a>
        {% endif %}
    </div>
</div>
{% endblock %}
